name: tailseeker
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Install the package itself in editable mode
    - -e ".[dev]"
    # Core
    - torch>=2.2.0
    - torchvision>=0.17.0
    - torchaudio>=2.2.0
    - pytorch-lightning>=2.2.0
    # Science
    - numpy>=1.26.0
    - pandas>=2.2.0
    - rdkit-pypi>=2022.9.5
    - torch-geometric>=2.5.0
    # Utilities
    - matplotlib>=3.8.0
    - seaborn>=0.13.0
    - tqdm>=4.66.0
    - wandb>=0.16.0
    - pyyaml>=6.0.1
    - dotmap>=1.3.30
    # Dev
    - pytest>=8.0.0
    - ruff>=0.3.0
