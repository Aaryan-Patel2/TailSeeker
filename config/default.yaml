# TailSeeker default configuration.
# Every key used in src/ must appear here with a sensible default.
# Override at runtime: python scripts/train.py loss.tilt=2.0 seed=1

# ── Reproducibility ──────────────────────────────────────────────────
seed: 42

# ── Model ────────────────────────────────────────────────────────────
model:
  in_channels: 4          # noisy input feature channels
  out_channels: 4         # predicted noise channels (must match in_channels)
  model_channels: 64      # base hidden dim (doubled at each downsample)
  num_res_blocks: 2       # ResBlocks per resolution level
  dropout: 0.0            # dropout probability inside ResBlocks

# ── Loss ─────────────────────────────────────────────────────────────
loss:
  mode: single            # "single" | "multi" | "reward"
                          #   single → get_loss_fn(tilt)
                          #   multi  → get_hierarchical_loss_fn(outer_tilt, group_tilts, gumbel_temp)
                          #   reward → get_reward_loss_fn(tilt, lambda, warmup_frac)
  tilt: 1.0               # single-objective TERM temperature; 0.0 = ERM (DDPMSimpleLoss)
                          # ablation axis: [-5,-2,-1,0,1,2,5,10]
  # Multi-objective settings (only used when mode: multi)
  outer_tilt: 1.0         # τ across pharmacological groups
  group_tilts: [1.0, 2.0, 5.0]  # per-group inner tilts [low-QED, mid-QED, high-QED]
  gumbel_temp: 1.0        # Gumbel-Softmax temperature λ; anneal toward 0 over training
  # Reward-tilt settings (only used when mode: reward)
  reward_tilt:
    tilt: 2.0             # Gibbs temperature over reward; 0.0 = ERM
                          # ablation axis: [-2,-1,0,1,2,5]
    lambda: 0.5           # SA penalty weight: r = QED - λ·(SA-1)/9
    warmup_frac: 0.3      # fraction of training to linearly warm up tilt (0 = no warmup)
    lambda_logp: 0.3      # LogP penalty weight: penalises LogP > 3 (too lipophilic)
    lambda_tpsa: 0.2      # TPSA reward weight: rewards low polar surface area (<140 Å²)

# ── Diffusion schedule ───────────────────────────────────────────────
diffusion:
  schedule: polynomial_2  # "polynomial_<int>" | "cosine"  (EDM convention; "linear" is NOT supported)
  num_timesteps: 1000
  beta_start: 1.0e-4      # CPU-only DDPMSimpleLoss fallback; not used by EDM runs
  beta_end: 0.02          # CPU-only DDPMSimpleLoss fallback; not used by EDM runs

# ── Training ─────────────────────────────────────────────────────────
training:
  learning_rate: 1.0e-4
  batch_size: 32
  max_epochs: 100
  grad_clip: 1.0
  use_ema: false
  ema_decay: 0.9999
  log_every_n_steps: 50   # W&B log frequency

# ── Data ─────────────────────────────────────────────────────────────
data:
  root: data/             # QM9 raw cache; relative to repo root
  max_atoms: 29           # QM9 max heavy atoms
  num_workers: 4
  download: false         # set true to auto-download QM9 on first run

# ── Logging / output ─────────────────────────────────────────────────
wandb:
  project: tailseeker
  entity: null            # set to your W&B username/org or null to skip
  mode: online            # "online" | "offline" | "disabled"

output_dir: outputs/${now:%Y-%m-%d_%H-%M-%S}  # Hydra interpolation
